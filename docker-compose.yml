version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: devpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: webphoenix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-devpay-backend}
    build: ./backend
    working_dir: /app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed --email demo@devpay.com --password Demo1234! &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-devpay-frontend}
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
